server:
  port: ${GATEWAY_PORT}

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lowerCaseServiceId: true
      httpclient:
        websocket:
          max-frame-payload-length: 65536
      routes:
        # WebSocket route for Chat service - must be before discovery locator routes
        - id: apollo-chat-websocket
          uri: lb://apollo-chat
          predicates:
            - Path=/apollo-chat/ws/**
          filters:
            - StripPrefix=1
        # Regular HTTP route for Chat service
        - id: apollo-chat
          uri: lb://apollo-chat
          predicates:
            - Path=/apollo-chat/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
  info:
    env:
      enabled: true
JWT_SECRET: ${JWT_SECRET}
info:
  app:
    name: gatewayserver
    description: Apollo Gateway Server Application
    version: 1.0.0

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
