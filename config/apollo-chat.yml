spring:
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5
        prefetch: 20


JWT_SECRET: ${JWT_SECRET}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mongo:
      enabled: false


do:
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT}
    region: ${DO_SPACES_REGION}
    bucket: ${DO_SPACES_BUCKET}
    access-key: ${DO_SPACES_ACCESS_KEY}
    secret-key: ${DO_SPACES_SECRET_KEY}
    presigned-url-expiry-minutes: ${DO_SPACES_PRESIGNED_EXPIRY}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


FRONTEND_URL: ${FRONTEND_URL}


logging:
  level:
    root: INFO
    com.apollo.chat: INFO